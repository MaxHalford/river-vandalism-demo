services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: river
      POSTGRES_PASSWORD: river
      POSTGRES_DB: river
    ports:
      - "5432:5432"
    volumes:
      - ./data/pg:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "river"]
      interval: 5s
      retries: 10

  ingest:
    build: .
    command: ["uv", "run", "ingest"]
    env_file: .env
    environment:
      POSTGRES_DSN: postgres://river:river@postgres:5432/river
    depends_on:
      postgres: { condition: service_healthy }

  ml:
    build: .
    command: ["uv", "run", "ml"]
    env_file: .env
    environment:
      POSTGRES_DSN: postgres://river:river@postgres:5432/river
    depends_on:
      postgres: { condition: service_healthy }

  dashboard:
    build: .
    command: ["uv", "run", "dashboard"]
    env_file: .env
    environment:
      POSTGRES_DSN: postgres://river:river@postgres:5432/river
    ports:
      - "8000:8000"
    depends_on:
      postgres: { condition: service_healthy }
